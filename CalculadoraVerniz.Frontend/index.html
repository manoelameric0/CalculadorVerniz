<!DOCTYPE html>

<html lang="pt-br" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="icons/icon-512.png" type="image/png">
    <title>Calculadora Verniz</title>
</head>
<body>
    <div class="app-container">

        <div class="header">
            <h1>Calculadora Verniz</h1>
        </div>

        <div class="input-group">
            <input id="inputLargura" type="number" placeholder="Largura (cm)">

            <input id="inputAltura" type="number" placeholder="Altura (cm)">

            <button id="btnAdicionar">Adicionar</button>

        </div>

        <div class="result-card">
            <h2 id="resultTitle">Adicionados</h2>

            <div id="resultContent">

            </div>
        </div>

        <button id="btnCalcular">Calcular</button>
        
    </div>
<script type="module" src="script.js"></script>
</body>
</html>
