<!DOCTYPE html>

<html lang="pt-br" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="icons/icon-512.png" type="image/png">
    <title>Calculadora Verniz</title>
</head>
<body>
    <div class="app-container">

        <div class="header">
            <h1>Calculadora Verniz</h1>
        </div>

        <button id="btnConfig">Configurações</button>

        <div id="janelaConfig" class="modal-config" style="display: none;"> 
            <div class="conteudo-config">
                <h3>Configurações de Consumo</h3>

                <div class="campo-grupo">
                    <label>Consumo por m² (ml):</label>
                    <input type="number" id="inputConsumo">
                </div>

                <div class="campo-grupo">
                    <label>Proporção Verniz:</label>
                    <div class="proporcao-container">
                        <input type="number" id="vernizParte" min="1">
                        <span>pra</span>
                        <input type="number" id="vernizTotal" min="1">
                    </div>
                </div>

                <div class="campo-grupo">
                    <label>Proporção Catalisador</label>
                    <div class="proporcao-container">
                        <input type="number" id="catalisadorParte" min="1">
                        <span>pra</span>
                        <input type="number" id="catalisadorTotal" min="1">
                    </div>
                </div>

                <div class="botoes-config">
                    <button id="btnFecharConfig">Fechar</button>
                </div>
            </div>
        </div>

        <div class="input-group">
            <input id="inputLargura" type="number" placeholder="Largura (cm)">

            <input id="inputAltura" type="number" placeholder="Altura (cm)">

            <button id="btnAdicionar">Adicionar</button>

        </div>

        <div class="result-card">
            <h2 id="resultTitle">Adicionados</h2>

            <div id="resultContent">

            </div>
        </div>

        <button id="btnCalcular">Calcular</button>
        
    </div>
<script type="module" src="script.js"></script>
</body>
</html>
